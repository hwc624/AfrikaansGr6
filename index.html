<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afrikaans Graad 6 Oefening – Bryanston</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --card: #ffffff;
    --primary: #2c5f9e;
    --accent: #f4a020;
    --green: #27ae60;
    --red: #e74c3c;
    --text: #1a1a2e;
    --muted: #6b7280;
    --radius: 18px;
    --shadow: 0 8px 32px rgba(44,95,158,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #2c5f9e 0%, #1a3a6b 100%);
    color: white;
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 4px 18px rgba(26,58,107,0.25);
  }
  .school-badge {
    width: 52px; height: 52px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', cursive;
    font-size: 10px; font-weight: 800;
    color: #1a3a6b;
    text-align: center; line-height: 1.1;
    flex-shrink: 0;
  }
  header h1 { font-family: 'Baloo 2', cursive; font-size: 1.35rem; font-weight: 800; line-height: 1.2; }
  header p { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }

  /* TOPIC MENU */
  #topic-screen {
    padding: 24px 16px;
    max-width: 540px; margin: 0 auto;
  }
  #topic-screen h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem; color: var(--primary);
    margin-bottom: 6px;
  }
  #topic-screen p.sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 20px; }

  .topic-grid { display: flex; flex-direction: column; gap: 12px; }
  .topic-btn {
    background: var(--card);
    border: 2.5px solid transparent;
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
    transition: all 0.18s;
    text-align: left;
  }
  .topic-btn:hover { border-color: var(--primary); transform: translateY(-2px); }
  .topic-icon {
    font-size: 1.8rem;
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .topic-btn .t-title { font-weight: 800; font-size: 1rem; color: var(--text); }
  .topic-btn .t-desc { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .t-pts { margin-left: auto; background: var(--primary); color: white; border-radius: 20px; padding: 3px 10px; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }

  /* QUIZ SCREEN */
  #quiz-screen { display: none; padding: 20px 16px; max-width: 540px; margin: 0 auto; }

  .quiz-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
  }
  .back-btn {
    background: var(--card); border: none; border-radius: 10px;
    padding: 8px 12px; cursor: pointer; font-size: 1rem; box-shadow: var(--shadow);
    color: var(--primary); font-weight: 700;
  }
  .quiz-topic-label { font-family: 'Baloo 2', cursive; font-size: 1.1rem; color: var(--primary); font-weight: 800; }
  .q-counter { margin-left: auto; font-size: 0.82rem; color: var(--muted); font-weight: 700; }

  .progress-bar { height: 8px; background: #dde4f5; border-radius: 8px; margin-bottom: 22px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 8px; transition: width 0.4s; }

  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    animation: fadeSlide 0.3s ease;
  }
  @keyframes fadeSlide { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

  .q-type-tag {
    display: inline-block;
    background: #e8eeff;
    color: var(--primary);
    font-size: 0.72rem; font-weight: 800;
    border-radius: 6px; padding: 3px 8px;
    margin-bottom: 10px; letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .q-text { font-size: 1.05rem; font-weight: 700; line-height: 1.5; color: var(--text); }
  .q-sentence { font-size: 0.92rem; color: var(--muted); margin-top: 6px; font-style: italic; }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .opt-btn {
    background: #f7f9ff;
    border: 2.5px solid #dde4f5;
    border-radius: 12px;
    padding: 13px 16px;
    text-align: left;
    cursor: pointer;
    font-size: 0.95rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    color: var(--text);
    transition: all 0.15s;
    display: flex; align-items: center; gap: 10px;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--primary); background: #eef2ff; }
  .opt-btn.correct { border-color: var(--green); background: #eafaf1; color: var(--green); }
  .opt-btn.wrong { border-color: var(--red); background: #fdecea; color: var(--red); }
  .opt-btn:disabled { cursor: default; }
  .opt-letter {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 900; flex-shrink: 0;
    transition: background 0.15s;
  }
  .opt-btn.correct .opt-letter { background: var(--green); }
  .opt-btn.wrong .opt-letter { background: var(--red); }

  /* INPUT type */
  .input-row { display: flex; gap: 10px; margin-top: 16px; }
  .q-input {
    flex: 1; border: 2.5px solid #dde4f5; border-radius: 12px;
    padding: 12px 14px; font-size: 0.95rem; font-family: 'Nunito', sans-serif; font-weight: 700;
    outline: none; transition: border 0.15s;
  }
  .q-input:focus { border-color: var(--primary); }
  .q-input.correct { border-color: var(--green); background: #eafaf1; }
  .q-input.wrong { border-color: var(--red); background: #fdecea; }
  .submit-btn {
    background: var(--primary); color: white; border: none;
    border-radius: 12px; padding: 12px 18px; font-size: 0.9rem;
    font-family: 'Nunito', sans-serif; font-weight: 800; cursor: pointer;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: #1a3a6b; }
  .submit-btn:disabled { background: #b0bec5; cursor: default; }

  /* FEEDBACK */
  .feedback-box {
    border-radius: 14px; padding: 16px 18px; margin-top: 14px;
    font-size: 0.88rem; line-height: 1.6; display: none;
  }
  .feedback-box.show { display: block; animation: fadeSlide 0.3s ease; }
  .feedback-box.correct-fb { background: #eafaf1; border: 2px solid var(--green); }
  .feedback-box.wrong-fb { background: #fef9ec; border: 2px solid var(--accent); }
  .feedback-box .fb-title { font-weight: 900; font-size: 1rem; margin-bottom: 6px; }
  .feedback-box .fb-en { color: var(--muted); font-style: italic; margin-top: 4px; }

  .next-btn {
    width: 100%; background: linear-gradient(135deg, var(--primary), #1a3a6b);
    color: white; border: none; border-radius: 14px;
    padding: 15px; font-size: 1rem; font-family: 'Nunito', sans-serif;
    font-weight: 800; cursor: pointer; margin-top: 14px;
    box-shadow: 0 4px 14px rgba(44,95,158,0.25);
    transition: transform 0.15s;
    display: none;
  }
  .next-btn:hover { transform: translateY(-2px); }
  .next-btn.show { display: block; animation: fadeSlide 0.25s ease; }

  /* SCORE SCREEN */
  #score-screen {
    display: none; padding: 32px 20px;
    max-width: 540px; margin: 0 auto; text-align: center;
  }
  .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 28px rgba(44,95,158,0.3);
  }
  .score-circle .big-num { font-family: 'Baloo 2', cursive; font-size: 2.8rem; color: white; font-weight: 800; line-height: 1; }
  .score-circle .big-denom { font-size: 1rem; color: rgba(255,255,255,0.8); }
  #score-screen h2 { font-family: 'Baloo 2', cursive; font-size: 1.6rem; color: var(--primary); margin-bottom: 8px; }
  #score-screen p { color: var(--muted); font-size: 0.92rem; margin-bottom: 24px; }
  .score-actions { display: flex; flex-direction: column; gap: 12px; }
  .score-actions button {
    padding: 14px; border-radius: 14px; border: none; font-size: 0.95rem;
    font-family: 'Nunito', sans-serif; font-weight: 800; cursor: pointer; transition: all 0.15s;
  }
  .btn-retry { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(44,95,158,0.25); }
  .btn-retry:hover { transform: translateY(-2px); }
  .btn-menu { background: var(--card); color: var(--primary); border: 2.5px solid var(--primary) !important; }
</style>
</head>
<body>

<header>
  <div class="school-badge">BPS<br>Gr.6</div>
  <div>
    <h1>Afrikaans Oefening</h1>
    <p>Bryanston Parallel Medium • Graad 6 • EAT 9 Junie 2026</p>
  </div>
</header>

<!-- TOPIC SELECTION -->
<div id="topic-screen">
  <h2>Kies 'n onderwerp 📚</h2>
  <p class="sub">Oefen elke afdeling vir jou toets. Every question is different!</p>
  <div class="topic-grid" id="topic-grid"></div>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="showTopics()">← Terug</button>
    <span class="quiz-topic-label" id="q-topic-label"></span>
    <span class="q-counter" id="q-counter"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="question-card" id="question-card">
    <div class="q-type-tag" id="q-type-tag"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-sentence" id="q-sentence"></div>
    <div class="options" id="options-area"></div>
    <div class="input-row" id="input-area" style="display:none">
      <input class="q-input" id="q-input" type="text" placeholder="Tik jou antwoord hier..." autocomplete="off" />
      <button class="submit-btn" id="submit-btn" onclick="checkInput()">✓ Antwoord</button>
    </div>
    <div class="feedback-box" id="feedback-box">
      <div class="fb-title" id="fb-title"></div>
      <div id="fb-body"></div>
      <div class="fb-en" id="fb-en"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Volgende vraag →</button>
  </div>
</div>

<!-- SCORE -->
<div id="score-screen">
  <div class="score-circle">
    <div class="big-num" id="final-score">0</div>
    <div class="big-denom" id="final-total">/10</div>
  </div>
  <h2 id="score-msg">Goed gedaan!</h2>
  <p id="score-sub"></p>
  <div class="score-actions">
    <button class="btn-retry" onclick="retryTopic()">🔄 Probeer weer (Try again)</button>
    <button class="btn-menu" onclick="showTopics()">📚 Kies 'n ander onderwerp</button>
  </div>
</div>

<script>
// ============================================================
// QUESTION BANKS
// ============================================================

const TOPICS = [
  {
    id: "vooragter",
    title: "Voor- en Agtervoegsels",
    desc: "Prefixes & Suffixes",
    icon: "🔤",
    color: "#e8f4fd",
    iconBg: "#2980b9",
    questions: () => shuffle([
      ...makePrefixQs(),
      ...makeSuffixQs()
    ]).slice(0,10)
  },
  {
    id: "voegwoorde",
    title: "Voegwoorde",
    desc: "Conjunctions",
    icon: "🔗",
    color: "#fef9ec",
    iconBg: "#f39c12",
    questions: () => shuffle(makeVoegwoordeQs()).slice(0,10)
  },
  {
    id: "afleidings",
    title: "Afleidings",
    desc: "Word Derivatives",
    icon: "🌱",
    color: "#eafaf1",
    iconBg: "#27ae60",
    questions: () => shuffle(makeAfleidingsQs()).slice(0,10)
  },
  {
    id: "samestellings",
    title: "Samestellings",
    desc: "Compound Words",
    icon: "🧩",
    color: "#fdf0f8",
    iconBg: "#8e44ad",
    questions: () => shuffle(makeSamestellingsQs()).slice(0,10)
  },
  {
    id: "kappies",
    title: "Kappies en Deeltekens",
    desc: "Circumflex & Diaeresis",
    icon: "â ë",
    color: "#fff3e0",
    iconBg: "#e67e22",
    questions: () => shuffle(makeKappiesQs()).slice(0,10)
  },
  {
    id: "afkortings",
    title: "Afkortings & Akronieme",
    desc: "Abbreviations & Acronyms",
    icon: "📝",
    color: "#e8f8f5",
    iconBg: "#16a085",
    questions: () => shuffle(makeAfkortingsQs()).slice(0,10)
  },
  {
    id: "hoefrek",
    title: "Hoëfrekwensiewoorde",
    desc: "High-frequency Words",
    icon: "⭐",
    color: "#eaf0fb",
    iconBg: "#2c5f9e",
    questions: () => shuffle(makeHoefrekQs()).slice(0,10)
  },
  {
    id: "byvoeglik",
    title: "Byvoeglike Naamwoorde",
    desc: "Adjectives",
    icon: "🎨",
    color: "#fdecea",
    iconBg: "#e74c3c",
    questions: () => shuffle(makeByvoeglikQs()).slice(0,10)
  },
  {
    id: "hulpwerk",
    title: "Hulpwerkwoorde",
    desc: "Auxiliary Verbs",
    icon: "⚙️",
    color: "#f4f0fb",
    iconBg: "#6c3483",
    questions: () => shuffle(makeHulpwerkQs()).slice(0,10)
  },
];

// ============================================================
function shuffle(arr) { return [...arr].sort(() => Math.random()-0.5); }
function pick(arr,n=4) { return shuffle(arr).slice(0,n); }
function mcq(q, correct, wrong, explain_af, explain_en, tag="Kies die korrekte antwoord") {
  const ops = shuffle([correct, ...pick(wrong,3)]);
  return { type:"mcq", tag, q, correct, ops, explain_af, explain_en };
}

// ============================================================
// 1. VOOR- EN AGTERVOEGSELS
// ============================================================
function makePrefixQs() {
  const data = [
    ["on","gelukkig","ongelukkig","unhappy","wees","gelukkig","bly","vrolik"],
    ["her","skryf","herskryf","rewrite","doen","skryf","maak","lees"],
    ["be","handel","behandel","treat / handle","praat","handel","werk","dink"],
    ["mis","verstaan","misverstaan","misunderstand","goed verstaan","snap","begryp","weet"],
    ["oor","doen","oordoen","overdo","onderdoen","doen","maak","werk"],
    ["onder","teken","onderteken","sign (undersign)","bo-teken","teken","skryf","druk"],
    ["bo","natuurlik","bonatuurlik","supernatural","onnatuurlik","natuur","hemel","wonder"],
  ];
  return data.map(([pref,base,word,en,w1,w2,w3,w4])=>
    mcq(
      `Watter woord word gevorm as jy die voorvoegsel "<strong>${pref}-</strong>" voor "<strong>${base}</strong>" sit?`,
      word,
      [w1,w2,w3,w4].filter(x=>x!==word),
      `🌟 <strong>${pref}-</strong> + <strong>${base}</strong> = <strong>${word}</strong><br>Die voorvoegsel "<strong>${pref}-</strong>" word <em>voor</em> die basiswoord geplaas om 'n nuwe woord te maak.`,
      `The prefix "<strong>${pref}-</strong>" is added to the beginning of "<strong>${base}</strong>" to make a new word: "<strong>${word}</strong>" (${en}).`,
      "Voorsetsels"
    )
  );
}
function makeSuffixQs() {
  const data = [
    ["heid","vry","vryheid","freedom","vrylaat","vrymaak","vrywees","vrygee"],
    ["lik","dag","daagliks","daily","dae","daagte","dagnag","daagse"],
    ["ing","maak","making","making/creation","makery","gemaak","gemake","makers"],
    ["er","leer","leerder","learner","leerling","leeraar","leermees","leerder"],
    ["te","koud","koue","cold (noun)","koudheid","koudigheid","kougheid","koudste"],
    ["skap","vriend","vriendskap","friendship","vriendelik","vriendin","vriendskappe","vriendkring"],
  ];
  return data.map(([suf,base,word,en,w1,w2,w3,w4])=>
    mcq(
      `Watter agtervoegsel maak jy as jy "<strong>-${suf}</strong>" aan "<strong>${base}</strong>" heg?`,
      word,
      [w1,w2,w3,w4].filter(x=>x!==word),
      `🌟 <strong>${base}</strong> + <strong>-${suf}</strong> = <strong>${word}</strong><br>Die agtervoegsel "<strong>-${suf}</strong>" word <em>agter</em> die basiswoord geplaas.`,
      `The suffix "<strong>-${suf}</strong>" is added to the END of "<strong>${base}</strong>" to make "<strong>${word}</strong>" (${en}).`,
      "Agtervoegsels"
    )
  );
}

// ============================================================
// 2. VOEGWOORDE (Conjunctions)
// ============================================================
function makeVoegwoordeQs() {
  const sentences = [
    { blank:"Ek eet pap ___ ek is honger.", ans:"want", ops:["maar","of","sodat"], af:"<strong>want</strong> word gebruik om 'n rede te gee — dit beteken 'because'.", en:"'want' = 'because' — it gives a reason for the action." },
    { blank:"Sy wil sing ___ sy kan nie.", ans:"maar", ops:["want","en","sodat"], af:"<strong>maar</strong> wys 'n teenstelling — iets teenoordienste gebeur.", en:"'maar' = 'but' — it shows a contrast or opposite idea." },
    { blank:"Jy kan loop ___ ry na die skool.", ans:"of", ops:["en","maar","want"], af:"<strong>of</strong> gee 'n keuse tussen twee dinge.", en:"'of' = 'or' — it gives two choices." },
    { blank:"Die seun ___ die meisie speel saam.", ans:"en", ops:["of","maar","want"], af:"<strong>en</strong> verbind twee dinge saam.", en:"'en' = 'and' — it joins two things together." },
    { blank:"Ek leer hard ___ ek goed kan doen.", ans:"sodat", ops:["want","maar","of"], af:"<strong>sodat</strong> verduidelik die doel van iets — hoekom jy dit doen.", en:"'sodat' = 'so that' — it explains the purpose or goal." },
    { blank:"Hy was moeg, ___ hy het geslaap.", ans:"dus", ops:["maar","of","want"], af:"<strong>dus</strong> wys gevolg — wat gebeur AS gevolg van iets.", en:"'dus' = 'therefore/so' — it shows a result." },
    { blank:"___ jy klaar is, kan jy speel.", ans:"Wanneer", ops:["Maar","Want","Of"], af:"<strong>Wanneer</strong> = 'When' — dit verduidelik TYD.", en:"'Wanneer' = 'When' — it tells us about timing." },
    { blank:"Ek ken hom ___ hy my broer is.", ans:"omdat", ops:["maar","of","sodat"], af:"<strong>omdat</strong> = 'because' — dit gee 'n rede.", en:"'omdat' = 'because' — it explains why something happens." },
    { blank:"Sy studeer ___ sy slaap.", ans:"terwyl", ops:["maar","want","sodat"], af:"<strong>terwyl</strong> = 'while' — twee dinge gebeur gelyktydig.", en:"'terwyl' = 'while' — two things happen at the same time." },
    { blank:"Sy is slim ___ hardwerkend.", ans:"en", ops:["of","maar","want"], af:"<strong>en</strong> verbind twee eienskappe saam.", en:"'en' = 'and' — joins two describing words together." },
  ];
  return sentences.map(({blank, ans, ops, af, en})=>({
    type:"mcq",
    tag:"Voegwoorde",
    q:`Kies die regte voegwoord (conjunction) vir die sin:`,
    sentence: blank,
    correct: ans,
    ops: shuffle([ans,...ops]),
    explain_af: af,
    explain_en: en
  }));
}

// ============================================================
// 3. AFLEIDINGS (Derivatives)
// ============================================================
function makeAfleidingsQs() {
  const items = [
    { base:"speel", derived:"speler", tag:"Afleiding", wrong:["speelbaar","gespeel","speelster","speelery"],
      af:"<strong>speel → speler</strong> — ons voeg <em>-er</em> by om iemand te beskryf wat iets doen.",
      en:"speel (play) → speler (player) — we add '-er' to describe the person who does the action." },
    { base:"werk", derived:"werker", tag:"Afleiding", wrong:["werkery","gewerk","werkbaar","werklikheid"],
      af:"<strong>werk → werker</strong> — die persoon wat werk.",
      en:"werk (work) → werker (worker) — the person who works." },
    { base:"skryf", derived:"skrywer", tag:"Afleiding", wrong:["geskryf","skryfsel","skryfbaar","skryftaak"],
      af:"<strong>skryf → skrywer</strong> — let op die spelling verandering (f→w).",
      en:"skryf (write) → skrywer (writer) — notice the spelling change f→w." },
    { base:"leer", derived:"leerling", tag:"Afleiding", wrong:["leerder","geleer","leerbaar","leerkrag"],
      af:"<strong>leer → leerling</strong> — 'n leerling is 'n kind wat leer.",
      en:"leer (learn) → leerling (learner/student)." },
    { base:"kook", derived:"kookster", tag:"Afleiding", wrong:["gekook","kookery","kooksel","koker"],
      af:"<strong>kook → kookster</strong> — '-ster' word gebruik vir 'n vroulike persoon.",
      en:"kook (cook) → kookster (female cook) — '-ster' is for a female person doing the action." },
    { base:"sing", derived:"sanger", tag:"Afleiding", wrong:["gesing","singery","singeling","singbaar"],
      af:"<strong>sing → sanger</strong> — die persoon wat sing.",
      en:"sing → sanger (singer)." },
    { base:"ryd", derived:"ryding", tag:"Afleiding", wrong:["geryde","ryder","ryderlik","rywerk"],
      af:"<strong>ry → ryding</strong> — '-ing' maak 'n handeling 'n selfstandige naamwoord.",
      en:"ry (ride) → ryding (riding) — '-ing' turns a verb into a noun." },

// ============================================================
// STATE
// ============================================================
let currentTopic = null;
let questions = [];
let qIndex = 0;
let score = 0;
let answered = false;

// ============================================================
// RENDER TOPICS
// ============================================================
function renderTopics() {
  const grid = document.getElementById("topic-grid");
  grid.innerHTML = TOPICS.map((t,i)=>`
    <button class="topic-btn" onclick="startTopic(${i})">
      <div class="topic-icon" style="background:${t.color}; font-size:1.5rem;">${t.icon}</div>
      <div>
        <div class="t-title">${t.title}</div>
        <div class="t-desc">${t.desc}</div>
      </div>
      <div class="t-pts">10 vrae</div>
    </button>
  `).join("");
}

function showTopics() {
  document.getElementById("topic-screen").style.display = "";
  document.getElementById("quiz-screen").style.display = "none";
  document.getElementById("score-screen").style.display = "none";
}

// ============================================================
// START TOPIC
// ============================================================
function startTopic(idx) {
  currentTopic = idx;
  questions = TOPICS[idx].questions();
  qIndex = 0; score = 0; answered = false;
  document.getElementById("topic-screen").style.display = "none";
  document.getElementById("quiz-screen").style.display = "";
  document.getElementById("score-screen").style.display = "none";
  document.getElementById("q-topic-label").textContent = TOPICS[idx].title;
  renderQuestion();
}

function retryTopic() { startTopic(currentTopic); }

// ============================================================
// RENDER QUESTION
// ============================================================
function renderQuestion() {
  answered = false;
  const q = questions[qIndex];
  const total = questions.length;
  document.getElementById("q-counter").textContent = `${qIndex+1} / ${total}`;
  document.getElementById("progress-fill").style.width = `${(qIndex/total)*100}%`;
  document.getElementById("q-type-tag").textContent = q.tag || "";
  document.getElementById("q-text").innerHTML = q.q;
  document.getElementById("q-sentence").innerHTML = q.sentence ? `"${q.sentence}"` : "";
  document.getElementById("feedback-box").className = "feedback-box";
  document.getElementById("next-btn").className = "next-btn";

  const optArea = document.getElementById("options-area");
  const inpArea = document.getElementById("input-area");

  if (q.type === "mcq") {
    inpArea.style.display = "none";
    optArea.innerHTML = "";
    const letters = ["A","B","C","D"];
    q.ops.forEach((op,i)=>{
      const btn = document.createElement("button");
      btn.className = "opt-btn";
      btn.innerHTML = `<span class="opt-letter">${letters[i]}</span> ${op}`;
      btn.onclick = () => checkMCQ(op, btn);
      optArea.appendChild(btn);
    });
  } else {
    optArea.innerHTML = "";
    inpArea.style.display = "flex";
    const inp = document.getElementById("q-input");
    inp.value = ""; inp.className = "q-input"; inp.disabled = false;
    document.getElementById("submit-btn").disabled = false;
  }
}

// ============================================================
// CHECK MCQ
// ============================================================
function checkMCQ(chosen, btn) {
  if (answered) return;
  answered = true;
  const q = questions[qIndex];
  const correct = chosen === q.correct;
  if (correct) score++;
  // Style all buttons
  document.querySelectorAll(".opt-btn").forEach(b=>{
    b.disabled = true;
    const label = b.textContent.trim().slice(1).trim();
    if (label === q.correct) b.className = "opt-btn correct";
    else if (b === btn && !correct) b.className = "opt-btn wrong";
  });
  showFeedback(correct, q);
}

function checkInput() {
  if (answered) return;
  const q = questions[qIndex];
  const val = document.getElementById("q-input").value.trim().toLowerCase();
  const correct = val === q.correct.toLowerCase();
  if (correct) score++;
  answered = true;
  const inp = document.getElementById("q-input");
  inp.className = "q-input " + (correct?"correct":"wrong");
  inp.disabled = true;
  document.getElementById("submit-btn").disabled = true;
  showFeedback(correct, q);
}

function showFeedback(correct, q) {
  const box = document.getElementById("feedback-box");
  const title = document.getElementById("fb-title");
  const body = document.getElementById("fb-body");
  const en = document.getElementById("fb-en");
  if (correct) {
    box.className = "feedback-box correct-fb show";
    title.innerHTML = "✅ Uitstekend! Well done!";
    body.innerHTML = q.explain_af || "";
    en.innerHTML = q.explain_en ? `🇬🇧 ${q.explain_en}` : "";
  } else {
    box.className = "feedback-box wrong-fb show";
    title.innerHTML = `❌ Nie heeltemal reg nie. Die korrekte antwoord is: <strong>${q.correct}</strong>`;
    body.innerHTML = q.explain_af || "";
    en.innerHTML = q.explain_en ? `🇬🇧 ${q.explain_en}` : "";
  }
  document.getElementById("next-btn").className = "next-btn show";
}

function nextQuestion() {
  qIndex++;
  if (qIndex >= questions.length) {
    showScore();
  } else {
    renderQuestion();
  }
}

// ============================================================
// SCORE
// ============================================================
function showScore() {
  document.getElementById("quiz-screen").style.display = "none";
  document.getElementById("score-screen").style.display = "";
  const total = questions.length;
  document.getElementById("final-score").textContent = score;
  document.getElementById("final-total").textContent = `/${total}`;
  const pct = score/total;
  let msg, sub;
  if (pct >= 0.9) { msg="🌟 Fantasties! Outstanding!"; sub="Jy is 'n Afrikaans-stêr! You're an Afrikaans star!"; }
  else if (pct >= 0.7) { msg="👏 Goed gedaan! Well done!"; sub="Bly net oef — oefen nog 'n bietjie! Keep practising!"; }
  else if (pct >= 0.5) { msg="💪 Mooi so! Not bad!"; sub="Probeer weer — jy kan dit! Try again — you've got this!"; }
  else { msg="📚 Bly oefen! Keep studying!"; sub="Lees die verduidelikings en probeer weer. Read the explanations and try again."; }
  document.getElementById("score-msg").textContent = msg;
  document.getElementById("score-sub").textContent = sub;
}

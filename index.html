<!DOCTYPE html>
<html lang="af">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afrikaans Graad 6 Oefening</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f0f4ff;color:#1a1a2e;min-height:100vh}
header{background:linear-gradient(135deg,#2c5f9e,#1a3a6b);color:#fff;padding:18px 20px 14px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 18px rgba(26,58,107,.25)}
.badge{width:50px;height:50px;background:#f4a020;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:10px;font-weight:800;color:#1a3a6b;text-align:center;line-height:1.1;flex-shrink:0}
header h1{font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800;line-height:1.2}
header p{font-size:.78rem;opacity:.8;margin-top:2px}
.screen{display:none;padding:20px 16px;max-width:540px;margin:0 auto}
.screen.active{display:block}

#topics h2{font-family:'Baloo 2',cursive;font-size:1.4rem;color:#2c5f9e;margin-bottom:4px}
#topics .sub{color:#6b7280;font-size:.86rem;margin-bottom:18px}
.tgrid{display:flex;flex-direction:column;gap:11px}
.tbtn{background:#fff;border:2.5px solid transparent;border-radius:16px;padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:13px;box-shadow:0 6px 24px rgba(44,95,158,.08);transition:all .18s;text-align:left}
.tbtn:hover{border-color:#2c5f9e;transform:translateY(-2px)}
.ticon{font-size:1.5rem;width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tbtn .tt{font-weight:800;font-size:.98rem}
.tbtn .td{font-size:.76rem;color:#6b7280;margin-top:1px}
.tpts{margin-left:auto;background:#2c5f9e;color:#fff;border-radius:20px;padding:3px 10px;font-size:.73rem;font-weight:700;flex-shrink:0}
.typebadges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.typebadge{font-size:.58rem;padding:2px 5px;border-radius:4px;font-weight:700}
.tb-mcq{background:#e8eeff;color:#2c5f9e}
.tb-type{background:#fef3e0;color:#e67e22}
.tb-tf{background:#eafaf1;color:#27ae60}
.tb-match{background:#fdf0f8;color:#8e44ad}
.tb-fill{background:#fff3e0;color:#d35400}
.tb-sen{background:#fce4ec;color:#c0392b}

.qheader{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.backbtn{background:#fff;border:none;border-radius:10px;padding:8px 12px;cursor:pointer;font-size:1rem;box-shadow:0 4px 14px rgba(0,0,0,.06);color:#2c5f9e;font-weight:700}
.qlabel{font-family:'Baloo 2',cursive;font-size:1.05rem;color:#2c5f9e;font-weight:800}
.qctr{margin-left:auto;font-size:.8rem;color:#6b7280;font-weight:700}
.pbar{height:7px;background:#dde4f5;border-radius:7px;margin-bottom:20px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#2c5f9e,#f4a020);border-radius:7px;transition:width .4s}
.qcard{background:#fff;border-radius:16px;padding:20px 18px;box-shadow:0 6px 24px rgba(44,95,158,.08);margin-bottom:14px;animation:fsl .3s ease}
@keyframes fsl{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qtag{display:inline-block;font-size:.68rem;font-weight:800;border-radius:6px;padding:3px 8px;margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase}
.tag-mcq{background:#e8eeff;color:#2c5f9e}
.tag-type{background:#fef3e0;color:#e67e22}
.tag-tf{background:#eafaf1;color:#27ae60}
.tag-match{background:#fdf0f8;color:#8e44ad}
.tag-fill{background:#fff3e0;color:#d35400}
.tag-sen{background:#fce4ec;color:#c0392b}
.qtxt{font-size:1.02rem;font-weight:700;line-height:1.5}
.qsen{font-size:.95rem;color:#2c5f9e;margin-top:8px;font-weight:800;background:#f7f9ff;padding:10px 14px;border-radius:10px;border-left:4px solid #2c5f9e}

.opts{display:flex;flex-direction:column;gap:9px;margin-top:15px}
.obtn{background:#f7f9ff;border:2.5px solid #dde4f5;border-radius:12px;padding:12px 15px;text-align:left;cursor:pointer;font-size:.93rem;font-family:'Nunito',sans-serif;font-weight:700;color:#1a1a2e;transition:all .15s;display:flex;align-items:center;gap:10px}
.obtn:hover:not(.done){border-color:#2c5f9e;background:#eef2ff}
.obtn.ok{border-color:#27ae60;background:#eafaf1;color:#27ae60}
.obtn.no{border-color:#e74c3c;background:#fdecea;color:#e74c3c}
.obtn.done{cursor:default}
.olet{width:26px;height:26px;border-radius:50%;background:#2c5f9e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:900;flex-shrink:0;transition:background .15s}
.obtn.ok .olet{background:#27ae60}
.obtn.no .olet{background:#e74c3c}

.tf-row{display:flex;gap:12px;margin-top:15px}
.tf-btn{flex:1;padding:16px;border-radius:14px;border:2.5px solid #dde4f5;background:#f7f9ff;cursor:pointer;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;text-align:center;transition:all .15s}
.tf-btn:hover:not(.done){border-color:#2c5f9e;transform:translateY(-2px)}
.tf-btn.ok{border-color:#27ae60;background:#eafaf1;color:#27ae60}
.tf-btn.no{border-color:#e74c3c;background:#fdecea;color:#e74c3c}
.tf-btn.done{cursor:default}
.tf-btn .tf-icon{font-size:1.6rem;display:block;margin-bottom:4px}

.type-area{margin-top:15px}
.type-row{display:flex;gap:10px}
.type-input{flex:1;border:2.5px solid #dde4f5;border-radius:12px;padding:12px 14px;font-size:.95rem;font-family:'Nunito',sans-serif;font-weight:700;outline:none;transition:border .15s}
.type-input:focus{border-color:#2c5f9e}
.type-input.ok{border-color:#27ae60;background:#eafaf1}
.type-input.no{border-color:#e74c3c;background:#fdecea}
.type-submit{background:#2c5f9e;color:#fff;border:none;border-radius:12px;padding:12px 18px;font-size:.9rem;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer}
.type-submit:hover{background:#1a3a6b}
.type-submit:disabled{background:#b0bec5;cursor:default}
.type-hint{font-size:.78rem;color:#6b7280;margin-top:6px;font-style:italic}
.correct-ans-show{margin-top:8px;padding:8px 12px;background:#eafaf1;border-radius:8px;font-weight:800;color:#27ae60;font-size:.9rem}

/* SENTENCE */
.sen-area{margin-top:15px}
.sen-textarea{width:100%;border:2.5px solid #dde4f5;border-radius:12px;padding:12px 14px;font-size:.93rem;font-family:'Nunito',sans-serif;font-weight:600;outline:none;resize:vertical;min-height:70px;transition:border .15s;line-height:1.5}
.sen-textarea:focus{border-color:#2c5f9e}
.sen-textarea.ok{border-color:#27ae60;background:#eafaf1}
.sen-textarea.no{border-color:#e74c3c;background:#fdecea}
.sen-submit{margin-top:10px;background:#c0392b;color:#fff;border:none;border-radius:12px;padding:12px 18px;font-size:.9rem;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;width:100%}
.sen-submit:hover{background:#96281b}
.sen-submit:disabled{background:#b0bec5;cursor:default}
.sen-reqs{margin-top:8px;font-size:.78rem;color:#6b7280}
.sen-reqs .chk{color:#27ae60;font-weight:800}
.sen-reqs .nochk{color:#e74c3c;font-weight:800}
.sen-example{margin-top:8px;padding:10px 14px;background:#fef9ec;border-radius:10px;border-left:4px solid #f4a020;font-size:.85rem;line-height:1.5}

.match-area{margin-top:15px}
.match-instr{font-size:.82rem;color:#6b7280;margin-bottom:10px}
.match-grid{display:flex;gap:12px}
.match-col{flex:1;display:flex;flex-direction:column;gap:8px}
.match-item{padding:10px 12px;border-radius:10px;border:2.5px solid #dde4f5;background:#f7f9ff;font-weight:700;font-size:.88rem;cursor:pointer;text-align:center;transition:all .15s;user-select:none}
.match-item:hover:not(.done){border-color:#2c5f9e;background:#eef2ff}
.match-item.selected{border-color:#f4a020;background:#fef9ec;box-shadow:0 0 0 3px rgba(244,160,32,.25)}
.match-item.ok{border-color:#27ae60;background:#eafaf1;color:#27ae60}
.match-item.no{border-color:#e74c3c;background:#fdecea;color:#e74c3c}
.match-item.done{cursor:default}
.match-score{margin-top:10px;font-size:.85rem;font-weight:700;color:#2c5f9e}

/* FEEDBACK */
.fb{border-radius:13px;padding:16px 18px;margin-top:13px;font-size:.86rem;line-height:1.7;display:none}
.fb.show{display:block;animation:fsl .3s ease}
.fb.fbok{background:#eafaf1;border:2px solid #27ae60}
.fb.fbno{background:#fef9ec;border:2px solid #f4a020}
.fb .fbt{font-weight:900;font-size:.96rem;margin-bottom:8px}
.fb-section{margin-top:8px;padding:8px 12px;border-radius:8px}
.fb-af{background:rgba(44,95,158,.06)}
.fb-zh{background:rgba(244,160,32,.08)}
.fb-en{background:rgba(39,174,96,.06)}
.fb-lang{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;display:block}
.fb-lang-af{color:#2c5f9e}
.fb-lang-zh{color:#e67e22}
.fb-lang-en{color:#27ae60}

.nbtn{width:100%;background:linear-gradient(135deg,#2c5f9e,#1a3a6b);color:#fff;border:none;border-radius:13px;padding:14px;font-size:.98rem;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;margin-top:13px;box-shadow:0 4px 14px rgba(44,95,158,.25);transition:transform .15s;display:none}
.nbtn:hover{transform:translateY(-2px)}
.nbtn.show{display:block;animation:fsl .25s ease}

#done{text-align:center;padding-top:36px}
.scirc{width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,#2c5f9e,#f4a020);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 28px rgba(44,95,158,.3)}
.scirc .sn{font-family:'Baloo 2',cursive;font-size:2.8rem;color:#fff;font-weight:800;line-height:1}
.scirc .sd{font-size:1rem;color:rgba(255,255,255,.8)}
#done h2{font-family:'Baloo 2',cursive;font-size:1.5rem;color:#2c5f9e;margin-bottom:8px}
#done p{color:#6b7280;font-size:.9rem;margin-bottom:22px}
.sacts{display:flex;flex-direction:column;gap:11px}
.sacts button{padding:13px;border-radius:13px;border:none;font-size:.93rem;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;transition:all .15s}
.srty{background:#2c5f9e;color:#fff;box-shadow:0 4px 14px rgba(44,95,158,.25)}
.srty:hover{transform:translateY(-2px)}
.smnu{background:#fff;color:#2c5f9e;border:2.5px solid #2c5f9e!important}
</style>
</head>
<body>

<header>
  <div class="badge">BPS<br>Gr.6</div>
  <div>
    <h1>Afrikaans Oefening</h1>
    <p>Bryanston Parallel Medium &bull; Graad 6 &bull; Toets 9 Junie 2026</p>
  </div>
</header>

<div id="topics" class="screen active">
  <h2>Kies jou onderwerp 📚</h2>
  <p class="sub">6 soorte vrae! 6 types of questions — including writing your own sentences!</p>
  <div class="tgrid" id="tgrid"></div>
</div>

<div id="quiz" class="screen">
  <div class="qheader">
    <button class="backbtn" id="backbtn">&#8592; Terug</button>
    <span class="qlabel" id="qlabel"></span>
    <span class="qctr" id="qctr"></span>
  </div>
  <div class="pbar"><div class="pfill" id="pfill"></div></div>
  <div class="qcard" id="qcard"></div>
</div>

<div id="done" class="screen">
  <div class="scirc">
    <div class="sn" id="fscore">0</div>
    <div class="sd" id="ftotal">/10</div>
  </div>
  <h2 id="smsg"></h2>
  <p id="ssub"></p>
  <div class="sacts">
    <button class="srty" id="retryBtn">&#128260; Probeer weer / Try again</button>
    <button class="smnu" id="menuBtn">&#128218; Kies ander onderwerp</button>
  </div>
</div>

<script>
function shuffle(a){var b=[...a];for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}

// =============================================
// QUESTION BANKS — each has af/zh/en
// =============================================

function makeVoorAgterQs(){
  var pool=[
    {type:'mcq',q:'Voeg die voorvoegsel <b>on-</b> by <b>gelukkig</b>:',ans:'ongelukkig',opts:['ongelukkig','wees','bly','vrolik'],
      af:'"on-" + "gelukkig" = <b>ongelukkig</b>。前綴 "on-" 把詞變成反義。',
      zh:'「on-」是一個前綴（prefix），加在詞的前面，意思就變成相反的。gelukkig = 快樂，ongelukkig = 不快樂。就像英文的 un-happy！',
      en:'"on-" is added BEFORE "gelukkig" to make the opposite: "ongelukkig" (unhappy). Like "un-" in English!'},
    {type:'mcq',q:'Voeg die voorvoegsel <b>her-</b> by <b>skryf</b>:',ans:'herskryf',opts:['herskryf','geskryf','skrywer','lees'],
      af:'"her-" beteken om iets WEER te doen. her- + skryf = <b>herskryf</b>。',
      zh:'「her-」這個前綴的意思是「再一次」。所以 herskryf = 重新寫（rewrite）。就像你考試寫錯了要重寫一樣！',
      en:'"her-" means "again". "herskryf" = rewrite. Like when you have to rewrite your homework!'},
    {type:'mcq',q:'Wat kry jy as jy <b>-heid</b> agter <b>vry</b> sit?',ans:'vryheid',opts:['vryheid','vrylaat','vrymaak','vrywees'],
      af:'vry + -heid = <b>vryheid</b>（freedom）。"-heid" 把形容詞變成名詞。',
      zh:'「-heid」是後綴（suffix），加在詞的後面。vry（自由的）+ -heid = vryheid（自由）。就像英文 free → freedom！',
      en:'"vry" (free) + "-heid" = "vryheid" (freedom). The suffix "-heid" turns an adjective into a noun, like "-dom" in English!'},
    {type:'mcq',q:'Wat kry jy as jy <b>-skap</b> agter <b>vriend</b> sit?',ans:'vriendskap',opts:['vriendskap','vriendelik','vriendin','vriendeloos'],
      af:'vriend + -skap = <b>vriendskap</b>（friendship）。',
      zh:'「-skap」是後綴，加在名詞後面。vriend（朋友）+ -skap = vriendskap（友誼）。像英文的 friend → friendship！',
      en:'"vriend" (friend) + "-skap" = "vriendskap" (friendship). Like "-ship" in English!'},

    {type:'type',q:'Tik die woord: <b>on-</b> + <b>moontlik</b> =',ans:'onmoontlik',hint:'Sit die voorvoegsel voor die woord',
      af:'on- + moontlik = <b>onmoontlik</b>（impossible）。',
      zh:'把「on-」放在「moontlik」（可能的）前面 = onmoontlik（不可能的）。前綴永遠加在前面！',
      en:'Put "on-" before "moontlik" (possible) = "onmoontlik" (impossible). Prefixes always go at the FRONT!'},
    {type:'type',q:'Tik die woord: <b>her-</b> + <b>bou</b> =',ans:'herbou',hint:'Sit die voorvoegsel voor die woord',
      af:'her- + bou = <b>herbou</b>（rebuild）。',
      zh:'her-（再次）+ bou（建造）= herbou（重建）。很簡單，直接黏在一起就好！',
      en:'"her-" (again) + "bou" (build) = "herbou" (rebuild). Just stick them together!'},
    {type:'type',q:'Tik die woord: <b>vriend</b> + <b>-lik</b> =',ans:'vriendelik',hint:'Let op die spelling!',
      af:'vriend + -lik = <b>vriendelik</b>。注意拼寫變化，多了一個 e！',
      zh:'vriend + -lik = vriendelik（友善的）。注意！中間多了一個「e」，不是直接加上去的。有些詞加後綴時拼寫會變化！',
      en:'"vriend" + "-lik" = "vriendelik" (friendly). Notice the extra "e" in the middle! Some words change spelling when adding suffixes.'},

    {type:'tf',q:'<b>ongelukkig</b> het die voorvoegsel <b>on-</b>。',ans:true,
      af:'WAAR！"on-" is die voorvoegsel voor "gelukkig"。',
      zh:'對的！「ongelukkig」這個詞裡面，「on-」就是前綴。把 on- 拿掉，剩下 gelukkig（快樂的），加上 on- 就變成不快樂的。',
      en:'TRUE! "on-" is the prefix in "ongelukkig". Remove "on-" and you get "gelukkig" (happy). Add "on-" = unhappy.'},
    {type:'tf',q:'Die agtervoegsel <b>-heid</b> word VOOR die woord geplaas。',ans:false,
      af:'ONWAAR！Agtervoegsel word AGTER die woord geplaas。',
      zh:'錯！「agtervoegsel」的意思就是「後綴」，要加在詞的後面（agter = 後面）。-heid 加在後面：vry + -heid = vryheid。如果加在前面就叫前綴（voorvoegsel）了！',
      en:'FALSE! "Agtervoegsel" means SUFFIX — it goes at the END of a word (agter = behind). -heid goes at the end: vry + -heid = vryheid.'},
    {type:'tf',q:'<b>herskryf</b> beteken om iets vir die eerste keer te skryf。',ans:false,
      af:'ONWAAR！her- beteken WEER（again），nie die eerste keer nie。',
      zh:'錯！「her-」的意思是「再一次」，不是第一次。herskryf = 重寫（rewrite），不是第一次寫。想想看：re-write，re- 就是「再」的意思！',
      en:'FALSE! "her-" means "again", not "first time". herskryf = rewrite. Think of English "re-" = again!'},

    {type:'sentence',q:'Skryf n sin met die woord <b>ongelukkig</b>。<br>（用 ongelukkig 寫一個句子）',
      required:['ongelukkig'],minWords:3,
      example:'Die seun is ongelukkig omdat hy nie kan speel nie.',
      af:'Jou sin moet die woord "ongelukkig" gebruik。',
      zh:'你的句子裡面必須有「ongelukkig」（不快樂的）這個詞。想一個不快樂的情境，然後寫出來！例如：Die seun is ongelukkig. = 那個男孩不快樂。',
      en:'Your sentence must contain the word "ongelukkig" (unhappy). Think of an unhappy situation! Example: Die seun is ongelukkig. = The boy is unhappy.'},
    {type:'sentence',q:'Skryf n sin met die woord <b>vriendskap</b>。<br>（用 vriendskap 寫一個句子）',
      required:['vriendskap'],minWords:3,
      example:'Vriendskap is baie belangrik vir my.',
      af:'Jou sin moet die woord "vriendskap" gebruik。',
      zh:'你的句子必須用到「vriendskap」（友誼）。想想什麼時候會說到友誼？例如：Vriendskap is belangrik. = 友誼很重要。',
      en:'Your sentence must use "vriendskap" (friendship). Example: Vriendskap is belangrik. = Friendship is important.'},
  ];
  return shuffle(pool).slice(0,10);
}

function makeVoegwoordeQs(){
  var pool=[
    {type:'fill',q:'Tik die voegwoord:',sen:'Ek eet pap ___ ek is honger.',ans:'want',hint:'"because"',
      af:'<b>want</b> = because。給出原因的連接詞。',
      zh:'「want」= because（因為）。這個詞用來解釋原因。「我吃粥因為我餓了」→ 「因為」就是 want。',
      en:'"want" = because — it gives the reason. "I eat porridge BECAUSE I am hungry."'},
    {type:'fill',q:'Tik die voegwoord:',sen:'Sy wil sing ___ sy kan nie.',ans:'maar',hint:'"but"',
      af:'<b>maar</b> = but。表示轉折。',
      zh:'「maar」= but（但是）。前面說她想唱歌，後面說她不會 → 中間就用「maar」（但是）。兩件相反的事情中間用 maar！',
      en:'"maar" = but — connects two opposite ideas. "She wants to sing BUT she cannot."'},
    {type:'fill',q:'Tik die voegwoord:',sen:'Die seun ___ die meisie speel saam.',ans:'en',hint:'"and"',
      af:'<b>en</b> = and。連接兩個東西。',
      zh:'「en」= and（和/跟）。男孩「和」女孩一起玩 → 用 en 連接兩個人。最簡單的連接詞！',
      en:'"en" = and — joins two things. "The boy AND the girl play together."'},
    {type:'fill',q:'Tik die voegwoord:',sen:'Jy kan loop ___ ry na die skool.',ans:'of',hint:'"or"',
      af:'<b>of</b> = or。給出選擇。',
      zh:'「of」= or（或者）。你可以走路「或者」開車去學校 → 有兩個選擇時就用 of！',
      en:'"of" = or — gives a choice. "You can walk OR drive to school."'},

    {type:'mcq',q:'Kies die regte voegwoord:',sen:'Ek leer hard ___ ek goed kan doen.',ans:'sodat',opts:['sodat','want','maar','of'],
      af:'<b>sodat</b> = so that。表示目的。',
      zh:'「sodat」= so that（為了/好讓）。我努力學習「為了」考好成績 → sodat 用來說明目的，你做這件事是為了什麼。',
      en:'"sodat" = so that — explains the PURPOSE. "I study hard SO THAT I can do well."'},

var curTopic=-1,qs=[],qi=0,sc=0,isDone=false;
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});document.getElementById(id).classList.add('active')}

function renderTopics(){
  var g=document.getElementById('tgrid'),html='';
  var tbc={'MCQ':'tb-mcq','Tik':'tb-type','W/O':'tb-tf','Invul':'tb-fill','Pas':'tb-match','Skryf':'tb-sen'};
  for(var i=0;i<TOPICS.length;i++){
    var t=TOPICS[i];
    var badges=t.types.map(function(tp){return '<span class="typebadge '+(tbc[tp]||'')+'">'+tp+'</span>'}).join('');
    html+='<button class="tbtn" data-idx="'+i+'"><div class="ticon" style="background:'+t.color+'">'+t.icon+'</div><div><div class="tt">'+t.title+'</div><div class="td">'+t.desc+'</div><div class="typebadges">'+badges+'</div></div><div class="tpts">10</div></button>';
  }
  g.innerHTML=html;
  g.addEventListener('click',function(e){var btn=e.target.closest('.tbtn');if(btn)startTopic(parseInt(btn.getAttribute('data-idx')))});
}

function startTopic(idx){curTopic=idx;qs=TOPICS[idx].gen();qi=0;sc=0;isDone=false;document.getElementById('qlabel').textContent=TOPICS[idx].title;showScreen('quiz');renderQ()}

function renderQ(){
  isDone=false;var q=qs[qi],total=qs.length;
  document.getElementById('qctr').textContent=(qi+1)+'/'+total;
  document.getElementById('pfill').style.width=((qi/total)*100)+'%';
  var card=document.getElementById('qcard'),html='';
  var tagC={'mcq':'tag-mcq','type':'tag-type','tf':'tag-tf','fill':'tag-fill','match':'tag-match','sentence':'tag-sen'}[q.type]||'tag-mcq';
  var tagL={'mcq':'Kies / Choose','type':'Tik / Type','tf':'Waar of Onwaar','fill':'Vul In / Fill In','match':'Pas Bymekaar / Match','sentence':'\u270D\uFE0F Skryf n sin / Write a sentence'}[q.type]||'';
  html+='<div class="qtag '+tagC+'">'+tagL+'</div>';
  html+='<div class="qtxt">'+q.q+'</div>';
  if(q.sen) html+='<div class="qsen">'+q.sen+'</div>';

  if(q.type==='mcq') html+=buildMCQ(q);
  else if(q.type==='type'||q.type==='fill') html+=buildType(q);
  else if(q.type==='tf') html+=buildTF(q);
  else if(q.type==='match') html+=buildMatch(q);
  else if(q.type==='sentence') html+=buildSentence(q);

  html+='<div class="fb" id="fbBox"><div class="fbt" id="fbTitle"></div><div id="fbSections"></div></div>';
  html+='<button class="nbtn" id="nxtBtn">Volgende vraag \u2192</button>';
  card.innerHTML=html;
  attachH(q);
}

function buildMCQ(q){var letters=['A','B','C','D'];var h='<div class="opts">';for(var i=0;i<q.opts.length;i++){h+='<button class="obtn" data-val="'+encodeURIComponent(q.opts[i])+'"><span class="olet">'+letters[i]+'</span> '+q.opts[i]+'</button>'}h+='</div>';return h}
function buildType(q){var h='<div class="type-area"><div class="type-row"><input class="type-input" id="typeInput" type="text" placeholder="Tik jou antwoord..." autocomplete="off"><button class="type-submit" id="typeSubmit">\u2713</button></div>';if(q.hint) h+='<div class="type-hint">\uD83D\uDCA1 '+q.hint+'</div>';h+='<div class="correct-ans-show" id="correctShow" style="display:none"></div></div>';return h}
function buildTF(q){return '<div class="tf-row"><button class="tf-btn" data-val="true"><span class="tf-icon">\u2705</span>Waar<br><small>True</small></button><button class="tf-btn" data-val="false"><span class="tf-icon">\u274C</span>Onwaar<br><small>False</small></button></div>'}
function buildMatch(q){var left=q.pairs.map(function(p){return p[0]});var right=shuffle(q.pairs.map(function(p){return p[1]}));var h='<div class="match-area"><div class="match-instr">\uD83D\uDC46 Klik links, dan regs / Click left then right</div><div class="match-grid"><div class="match-col" id="matchL">';for(var i=0;i<left.length;i++) h+='<div class="match-item" data-side="L" data-idx="'+i+'" data-val="'+left[i]+'">'+left[i]+'</div>';h+='</div><div class="match-col" id="matchR">';for(var i=0;i<right.length;i++) h+='<div class="match-item" data-side="R" data-idx="'+i+'" data-val="'+right[i]+'">'+right[i]+'</div>';h+='</div></div><div class="match-score" id="matchScore">0/'+left.length+' gepas</div></div>';return h}

function buildSentence(q){
  var h='<div class="sen-area">';
  h+='<textarea class="sen-textarea" id="senInput" placeholder="Skryf jou sin hier... / Write your sentence here..."></textarea>';
  h+='<button class="sen-submit" id="senSubmit">\u270D\uFE0F Kyk my sin / Check my sentence</button>';
  h+='<div class="sen-reqs" id="senReqs"></div>';
  h+='<div class="sen-example" id="senExample" style="display:none"></div>';
  h+='<div class="correct-ans-show" id="correctShow" style="display:none"></div>';
  h+='</div>';
  return h;
}

// =============================================
function attachH(q){
  var nxt=document.getElementById('nxtBtn');
  nxt.addEventListener('click',function(){qi++;if(qi>=qs.length)showScore();else renderQ()});

  if(q.type==='mcq'){
    var btns=document.querySelectorAll('.obtn');
    btns.forEach(function(b){b.addEventListener('click',function(){
      if(isDone) return; isDone=true;
      var val=decodeURIComponent(b.getAttribute('data-val'));
      var ok=(val===q.ans); if(ok) sc++;
      btns.forEach(function(bb){bb.classList.add('done');var bv=decodeURIComponent(bb.getAttribute('data-val'));if(bv===q.ans)bb.classList.add('ok');else if(bb===b&&!ok)bb.classList.add('no')});
      showFB(ok,q);
    })});
  } else if(q.type==='type'||q.type==='fill'){
    var inp=document.getElementById('typeInput'),sub=document.getElementById('typeSubmit');
    var doCheck=function(){
      if(isDone) return; isDone=true;
      var val=inp.value.trim().toLowerCase(),ok=(val===q.ans.toLowerCase());
      if(ok) sc++; inp.disabled=true; sub.disabled=true;
      if(ok) inp.classList.add('ok');
      else{inp.classList.add('no');document.getElementById('correctShow').style.display='block';document.getElementById('correctShow').innerHTML='\u2705 Korrekte antwoord: <b>'+q.ans+'</b>'}
      showFB(ok,q);
    };
    sub.addEventListener('click',doCheck);
    inp.addEventListener('keydown',function(e){if(e.key==='Enter')doCheck()});
    inp.focus();
  } else if(q.type==='tf'){
    var btns=document.querySelectorAll('.tf-btn');
    btns.forEach(function(b){b.addEventListener('click',function(){
      if(isDone) return; isDone=true;
      var val=(b.getAttribute('data-val')==='true'),ok=(val===q.ans);
      if(ok) sc++;
      btns.forEach(function(bb){bb.classList.add('done');var bv=(bb.getAttribute('data-val')==='true');if(bv===q.ans)bb.classList.add('ok');else if(bb===b&&!ok)bb.classList.add('no')});
      showFB(ok,q);
    })});
  } else if(q.type==='match'){
    var pairs=q.pairs,selL=null,matched=0,total=pairs.length;
    document.querySelectorAll('.match-item').forEach(function(it){
      it.addEventListener('click',function(){
        if(it.classList.contains('done')) return;
        var side=it.getAttribute('data-side');
        if(side==='L'){document.querySelectorAll('[data-side="L"]').forEach(function(x){x.classList.remove('selected')});it.classList.add('selected');selL=it.getAttribute('data-val')}
        else if(side==='R'&&selL!==null){
          var rVal=it.getAttribute('data-val'),isOk=false;
          for(var p=0;p<pairs.length;p++){if(pairs[p][0]===selL&&pairs[p][1]===rVal){isOk=true;break}}
          var lItem=document.querySelector('[data-side="L"][data-val="'+selL+'"]');
          if(isOk){lItem.classList.add('ok','done');it.classList.add('ok','done');matched++;document.getElementById('matchScore').textContent=matched+'/'+total+' gepas'}
          else{lItem.classList.add('no');it.classList.add('no');setTimeout(function(){lItem.classList.remove('no');it.classList.remove('no')},600)}
          lItem.classList.remove('selected');selL=null;
          if(matched===total){isDone=true;sc++;showFB(true,q)}
        }
      });
    });
  } else if(q.type==='sentence'){
    var inp=document.getElementById('senInput'),sub=document.getElementById('senSubmit');
    sub.addEventListener('click',function(){
      if(isDone) return;
      var val=inp.value.trim();
      if(val.length<3){document.getElementById('senReqs').innerHTML='<span class="nochk">\u26A0 Skryf n langer sin! Write a longer sentence!</span>';return}
      isDone=true; inp.disabled=true; sub.disabled=true;
      var words=val.split(/\s+/);
      var hasWord=false;
      var valLow=val.toLowerCase();
      if(q.requireAny){
        for(var r=0;r<q.required.length;r++){if(valLow.indexOf(q.required[r].toLowerCase())!==-1){hasWord=true;break}}
      } else {
        hasWord=true;
        for(var r=0;r<q.required.length;r++){if(valLow.indexOf(q.required[r].toLowerCase())!==-1){hasWord=true;break}}
        hasWord=false;
        for(var r=0;r<q.required.length;r++){if(valLow.indexOf(q.required[r].toLowerCase())!==-1){hasWord=true;break}}
      }
      var longEnough=words.length>=(q.minWords||3);
      var ok=hasWord&&longEnough;
      if(ok){sc++;inp.classList.add('ok');document.getElementById('senReqs').innerHTML='<span class="chk">\u2705 Goeie sin! Good sentence!</span>'}
      else{
        inp.classList.add('no');
        var msg='';
        if(!hasWord) msg+='<span class="nochk">\u274C Jy moet die regte woord gebruik! You must use the required word!</span><br>';
        if(!longEnough) msg+='<span class="nochk">\u274C Sin is te kort! Sentence is too short!</span>';
        document.getElementById('senReqs').innerHTML=msg;
      }
      if(q.example){document.getElementById('senExample').style.display='block';document.getElementById('senExample').innerHTML='\uD83D\uDCDD <b>Voorbeeld / Example:</b><br>'+q.example}
      showFB(ok,q);
    });
  }
}

// =============================================
// FEEDBACK — trilingual
// =============================================
function showFB(ok,q){
  var fb=document.getElementById('fbBox');
  var fbt=document.getElementById('fbTitle');
  var fbs=document.getElementById('fbSections');
  if(ok){
    fb.className='fb fbok show';
    fbt.innerHTML='\u2705 Uitstekend! Well done! \u505A\u5F97\u597D\uFF01';
  } else {
    fb.className='fb fbno show';
    if(q.type==='match') fbt.innerHTML='\u274C Nie alles reg nie / Not all correct';
    else if(q.type==='sentence') fbt.innerHTML='\u274C Probeer weer volgende keer! / Try again next time!';
    else fbt.innerHTML='\u274C Die antwoord is: <b>'+q.ans+'</b>';
  }
  var sections='';
  if(q.af) sections+='<div class="fb-section fb-af"><span class="fb-lang fb-lang-af">Afrikaans</span>'+q.af+'</div>';
  if(q.zh) sections+='<div class="fb-section fb-zh"><span class="fb-lang fb-lang-zh">\u4E2D\u6587 Chinese</span>'+q.zh+'</div>';
  if(q.en) sections+='<div class="fb-section fb-en"><span class="fb-lang fb-lang-en">English</span>'+q.en+'</div>';
  fbs.innerHTML=sections;
  document.getElementById('nxtBtn').classList.add('show');
}

function showScore(){
  showScreen('done');var total=qs.length;
  document.getElementById('fscore').textContent=sc;
  document.getElementById('ftotal').textContent='/'+total;
  var pct=sc/total,msg,sub;
  if(pct>=0.9){msg='\uD83C\uDF1F Fantasties! \u592A\u68D2\u4E86\uFF01';sub='Jy is n Afrikaans-ster! \u4F60\u662F Afrikaans \u4E4B\u661F\uFF01';}
  else if(pct>=0.7){msg='\uD83D\uDC4F Goed gedaan! \u505A\u5F97\u597D\uFF01';sub='Oefen nog n bietjie! \u518D\u7DF4\u7FD2\u4E00\u4E0B\uFF01';}
  else if(pct>=0.5){msg='\uD83D\uDCAA Mooi so! \u4E0D\u932F\uFF01';sub='Probeer weer! \u518D\u8A66\u4E00\u6B21\uFF01';}
  else{msg='\uD83D\uDCDA Bly oefen! \u7E7C\u7E8C\u52A0\u6CB9\uFF01';sub='\u8B80\u4E00\u8B80\u89E3\u91CB\u518D\u8A66\u8A66\u3002Read the explanations and try again.';}
  document.getElementById('smsg').textContent=msg;
  document.getElementById('ssub').textContent=sub;
}

document.getElementById('retryBtn').addEventListener('click',function(){startTopic(curTopic)});
document.getElementById('menuBtn').addEventListener('click',function(){showScreen('topics')});
